# ──────────────────────────────────────────────────────────────
# Static configuration — same across all environments.
# Override any value via .env (environment-specific).
# ──────────────────────────────────────────────────────────────

# LLM settings
model: gpt-4o-mini
temperature: 0.1
max_output_tokens: 16000

# Token budget
context_window: 128000
max_input_tokens: 100000
safety_margin_tokens: 2000

# Chunking
max_chunk_tokens: 4000

# Concurrency
max_concurrent: 5

# Cost limits
max_cost_usd: 5.0
input_cost_per_1k: 0.00015
output_cost_per_1k: 0.0006

# Cache
cache_enabled: true
cache_ttl_days: 7

# File filtering — source code extensions (for preprocessor)
source_extensions:
  - .java
  - .py
  - .go
  - .js
  - .jsx
  - .ts
  - .tsx
  - .kt

# Config file extensions (kept as context, not analyzed)
config_extensions:
  - .xml
  - .yml
  - .yaml
  - .json
  - .toml
  - .properties
  - .gradle
  - .kts
  - .sql
  - .md

# Directories to skip entirely
skip_dirs:
  - .git
  - .svn
  - __pycache__
  - .pytest_cache
  - .mypy_cache
  - node_modules
  - vendor
  - .venv
  - venv
  - build
  - target
  - dist
  - out
  - bin
  - .gradle
  - .idea
  - .vscode
  - coverage
  - generated

# Auto-generated file markers (skip if found in first 10 lines)
generated_markers:
  - "auto-generated"
  - "automatically generated"
  - "generated by"
  - "do not edit"
  - "do not modify"
  - "this file is generated"
  - "@generated"
  - "code generated by"

# Max file size to process (bytes)
max_file_size: 100000
